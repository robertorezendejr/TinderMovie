<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TinderMovie - Nova Senha</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

  <link rel="stylesheet" href="index.css">
  <link rel="stylesheet" href="login.css">
</head>
<body>

  <div id="app" class="app-container">
    <div class="login-wrapper">

      <div class="login-brand">
        <img src="assets/icon.png" alt="TinderMovie" class="logo-img login-logo-img">
        <h1>Tinder<span>Movie</span></h1>
      </div>

      <!-- Estado: carregando / verificando token -->
      <div id="state-loading" class="reset-state">
        <div class="spinner"></div>
        <p style="color: var(--text-muted); font-size: 14px;">Verificando link...</p>
      </div>

      <!-- Estado: formulário de nova senha -->
      <form id="state-form" class="login-form hidden" novalidate>
        <p class="login-tagline" style="text-align:left; margin-bottom: 4px;">
          Digite sua nova senha abaixo.
        </p>

        <div class="input-group">
          <label for="new-password">Nova Senha</label>
          <div class="input-field">
            <i class="fa-solid fa-lock input-icon"></i>
            <input type="password" id="new-password" placeholder="Mínimo 6 caracteres" required minlength="6">
            <button type="button" class="toggle-password" onclick="togglePassword('new-password', 'icon-new')">
              <i class="fa-solid fa-eye" id="icon-new"></i>
            </button>
          </div>
        </div>

        <div class="input-group">
          <label for="confirm-password">Confirmar Nova Senha</label>
          <div class="input-field">
            <i class="fa-solid fa-lock input-icon"></i>
            <input type="password" id="confirm-password" placeholder="Repita a nova senha" required>
          </div>
        </div>

        <div id="reset-feedback" class="auth-feedback hidden"></div>

        <button type="submit" class="primary-button login-btn" id="btn-reset-submit">
          Salvar Nova Senha
        </button>
      </form>

      <!-- Estado: erro (link expirado ou inválido) -->
      <div id="state-error" class="reset-state hidden">
        <div class="reset-icon-error">
          <i class="fa-solid fa-circle-xmark"></i>
        </div>
        <h3>Link inválido ou expirado</h3>
        <p>O link de redefinição expirou. Solicite um novo link pelo formulário de login.</p>
        <a href="login.html" class="primary-button login-btn" style="text-align:center; text-decoration:none; display:block; margin-top: 8px;">
          Voltar ao Login
        </a>
      </div>

      <!-- Estado: sucesso -->
      <div id="state-success" class="reset-state hidden">
        <div class="reset-icon-success">
          <i class="fa-solid fa-circle-check"></i>
        </div>
        <h3>Senha atualizada!</h3>
        <p>Sua nova senha foi salva com sucesso.</p>
        <a href="login.html" class="primary-button login-btn" style="text-align:center; text-decoration:none; display:block; margin-top: 8px;">
          Ir para o Login
        </a>
      </div>

    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase-client.js"></script>
  <script>
    function show(id) {
      ["state-loading", "state-form", "state-error", "state-success"].forEach(s => {
        document.getElementById(s).classList.toggle("hidden", s !== id);
        if (s === "state-loading") document.getElementById(s).style.display = s === id ? "flex" : "none";
      });
    }

    function togglePassword(inputId, iconId) {
      const input = document.getElementById(inputId);
      const icon = document.getElementById(iconId);
      const isHidden = input.type === "password";
      input.type = isHidden ? "text" : "password";
      icon.className = isHidden ? "fa-solid fa-eye-slash" : "fa-solid fa-eye";
    }

    // Verificar se há erro no hash da URL (link expirado vindo do Supabase)
    const hashParams = new URLSearchParams(window.location.hash.substring(1));
    if (hashParams.get("error")) {
      show("state-error");
    } else {
      // Aguardar o evento PASSWORD_RECOVERY do supabase-js
      supabaseClient.auth.onAuthStateChange((event) => {
        if (event === "PASSWORD_RECOVERY") {
          show("state-form");
        }
      });

      // Timeout de segurança: se não receber o evento em 4s, mostra erro
      setTimeout(() => {
        const loading = document.getElementById("state-loading");
        if (!loading.classList.contains("hidden") || loading.style.display !== "none") {
          show("state-error");
        }
      }, 4000);
    }

    // Submissão da nova senha
    document.getElementById("state-form").addEventListener("submit", async (e) => {
      e.preventDefault();
      const password = document.getElementById("new-password").value;
      const confirm = document.getElementById("confirm-password").value;
      const feedback = document.getElementById("reset-feedback");

      if (password !== confirm) {
        feedback.textContent = "As senhas não coincidem.";
        feedback.className = "auth-feedback error";
        return;
      }

      const btn = document.getElementById("btn-reset-submit");
      btn.disabled = true;
      btn.textContent = "Salvando...";

      const { error } = await supabaseClient.auth.updateUser({ password });

      if (error) {
        const mensagens = {
          "New password should be different from the old password": "A nova senha deve ser diferente da senha atual."
        };
        feedback.textContent = mensagens[error.message] || error.message;
        feedback.className = "auth-feedback error";
        btn.disabled = false;
        btn.textContent = "Salvar Nova Senha";
      } else {
        await supabaseClient.auth.signOut();
        show("state-success");
      }
    });
  </script>

</body>
</html>
